name: Tag Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: write

jobs:
  tag-release:
    name: tag-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Read package version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid semver version: $VERSION" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate release notes
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          FILE="releases/${VERSION}.md"

          test -f "$FILE"

          if ! head -n 1 "$FILE" | grep -Eq "^# Linmas ${VERSION}$"; then
            echo "Release notes header must be: # Linmas ${VERSION}" >&2
            exit 1
          fi

      - name: Decide release handoff
        id: gate
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          TAG_EXISTS=false
          PUBLISHED=false

          if git rev-parse "$TAG" >/dev/null 2>&1 || git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            TAG_EXISTS=true
          fi

          if npm view "linmas@${VERSION}" version >/dev/null 2>&1; then
            PUBLISHED=true
          fi

          if [[ "$TAG_EXISTS" == true && "$PUBLISHED" == false ]]; then
            echo "Ambiguous release state: tag exists but npm version is unpublished: $TAG" >&2
            exit 1
          fi

          SHOULD_RELEASE=false
          if [[ "$TAG_EXISTS" == false && "$PUBLISHED" == false ]]; then
            SHOULD_RELEASE=true
          fi

          echo "tag_exists=$TAG_EXISTS" >> "$GITHUB_OUTPUT"
          echo "published=$PUBLISHED" >> "$GITHUB_OUTPUT"
          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"

      - name: Create and push release tag
        if: ${{ steps.gate.outputs.should_release == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"

      - name: Dispatch release workflow
        if: ${{ steps.gate.outputs.should_release == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          gh workflow run release.yml --ref main -f tag="$TAG"
