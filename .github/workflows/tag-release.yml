name: Tag Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag-release:
    name: tag-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Read package version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid semver version: $VERSION" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate release notes
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          FILE="releases/${VERSION}.md"

          test -f "$FILE"

          if ! head -n 1 "$FILE" | grep -Eq "^# Linmas ${VERSION}$"; then
            echo "Release notes header must be: # Linmas ${VERSION}" >&2
            exit 1
          fi

      - name: Ensure tag does not already exist
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists locally: $TAG" >&2
            exit 0
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag already exists remotely: $TAG" >&2
            exit 0
          fi

      - name: Ensure npm version is not already published
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"

          if npm view "linmas@${VERSION}" version >/dev/null 2>&1; then
            echo "linmas@${VERSION} is already published. Skipping tag creation."
            exit 0
          fi

      - name: Create and push release tag
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"
