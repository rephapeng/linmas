name: Release
on:
  push:
    tags:
      - 'v*.*.*'
permissions:
  contents: read
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: git fetch origin main
      - run: node scripts/verify-release-tag.mjs --tag "${GITHUB_REF_NAME}" --version-file package.json --main-ref origin/main
      - name: Read release notes
        id: release_notes
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          FILE="releases/${VERSION}.md"
          if [ ! -f "$FILE" ]; then
            echo "::error::Release notes file $FILE is missing"
            exit 1
          fi
          DELIM="release_notes_$(date +%s%N)"
          echo "BODY<<$DELIM" >> "$GITHUB_OUTPUT"
          cat "$FILE" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "$DELIM" >> "$GITHUB_OUTPUT"

      - run: npm test
      - run: npm run validate
      - run: npm run pack:dry-run
      - run: npm pack
      - uses: actions/upload-artifact@v5
        with:
          name: release-artifact
          path: '*.tgz'
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.release_notes.outputs.BODY }}
          files: '*.tgz'

  provenance:
    if: ${{ !github.event.repository.private }}
    needs: publish
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    uses: ./.github/workflows/generator-generic-ossf-slsa3-publish.yml
    with:
      artifact-name: release-artifact
      subject-path: 'linmas-*.tgz'
