name: Release
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v0.1.6'
        required: true
        type: string
permissions:
  contents: read
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - name: Ensure npm supports trusted publishing
        run: |
          set -euo pipefail
          npm --version
          npm install -g npm@11
          NPM_VERSION="$(npm --version)"
          echo "$NPM_VERSION"
          NPM_VERSION="$NPM_VERSION" node -e 'const [major = 0, minor = 0, patch = 0] = (process.env.NPM_VERSION || "0.0.0").split(".").map(Number); const ok = major > 11 || (major === 11 && (minor > 5 || (minor === 5 && patch >= 1))); if (!ok) { console.error(`npm ${process.env.NPM_VERSION} does not support trusted publishing`); process.exit(1); }'
      - name: Validate release tag input
        run: |
          case "${RELEASE_TAG}" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "::error::Invalid release tag: ${RELEASE_TAG}"
              exit 1
              ;;
          esac
      - run: npm ci
      - run: git fetch origin main
      - run: node scripts/verify-release-tag.mjs --tag "${RELEASE_TAG}" --version-file package.json --main-ref origin/main
      - name: Read release notes
        id: release_notes
        run: |
          VERSION=${RELEASE_TAG#v}
          FILE="releases/${VERSION}.md"
          if [ ! -f "$FILE" ]; then
            echo "::error::Release notes file $FILE is missing"
            exit 1
          fi
          DELIM="release_notes_$(date +%s%N)"
          echo "BODY<<$DELIM" >> "$GITHUB_OUTPUT"
          cat "$FILE" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "$DELIM" >> "$GITHUB_OUTPUT"

      - run: npm test
      - run: npm run validate
      - run: npm run pack:dry-run
      - run: npm pack
      - uses: actions/upload-artifact@v7
        with:
          name: release-artifact
          path: '*.tgz'
      - name: Publish to npm
        run: npm publish --access public
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body: ${{ steps.release_notes.outputs.BODY }}
          files: '*.tgz'

  provenance:
    if: ${{ !github.event.repository.private }}
    needs: publish
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    uses: ./.github/workflows/generator-generic-ossf-slsa3-publish.yml
    with:
      artifact-name: release-artifact
      subject-path: 'linmas-*.tgz'
